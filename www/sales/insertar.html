<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <title>Registrar Venta</title>
</head>
<body class="p-8">
    <h1 class="text-2xl font-bold mb-6">Registrar Nueva Venta</h1>

    <form id="formNuevaVenta" class="flex flex-col gap-4 max-w-lg">
        <div>
            <label class="block text-sm font-medium mb-1">Orden de Reparación</label>
            <select name="id_order" id="id_order" class="select select-bordered w-full" required></select>
        </div>
        
        <div>
            <label class="block text-sm font-medium mb-1">Cajero (Usuario)</label>
            <select name="id_user" id="id_user" class="select select-bordered w-full" required></select>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">Método de Pago</label>
            <select name="payment_method" id="payment_method" class="select select-bordered w-full" required>
                <option value="">-- Selecciona --</option>
                <option value="Efectivo">Efectivo</option>
                <option value="Tarjeta">Tarjeta</option>
                <option value="Transferencia">Transferencia</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">Total Pagado</label>
            <input type="number" step="0.01" name="total_paid" id="total_paid" placeholder="Ej. 1500.50" class="input input-bordered w-full" required>
        </div>
        
        <div class="flex gap-2 mt-4">
            <button type="submit" id="btnGuardar" class="btn btn-primary">Guardar</button>
            <a href="index.html" class="btn btn-ghost">Cancelar</a>
        </div>
    </form>

    <script src="../js/sales.js"></script>
</body>
</html>
