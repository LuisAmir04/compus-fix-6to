<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <title>Ventas</title>
</head>
<body class="p-8">
    <div id="navbar-container"></div>
    
    <div id="vista-tabla" class="overflow-x-auto">
        <div class="mb-4">
            <button id="btnNuevo" class="btn btn-primary">Registrar Venta</button>
        </div>
        
        <table class="table table-zebra w-full">
            <thead>
                <tr>
                    <th>ID Venta</th>
                    <th>ID Orden</th>
                    <th>Cajero / Técnico</th>
                    <th>Método de pago</th>
                    <th>Total pagado</th>
                    <th>Fecha de venta</th>
                    <th>Acciones</th> 
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div id="vista-formulario" class="hidden">
        <h1 id="tituloFormulario" class="text-2xl font-bold mb-6">Registrar Nueva Venta</h1>

        <form id="formNuevaVenta" class="flex flex-col gap-4 max-w-lg">
            
            <input type="hidden" name="id_sale" id="id_sale">

            <div>
                <label class="block text-sm font-medium mb-1">Orden de Reparación</label>
                <select name="id_order" id="id_order" class="select select-bordered w-full" required></select>
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-1">Cajero (Usuario)</label>
                <select name="id_user" id="id_user" class="select select-bordered w-full" required></select>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Método de Pago</label>
                <select name="payment_method" id="payment_method" class="select select-bordered w-full" required>
                    <option value="">-- Selecciona --</option>
                    <option value="Efectivo">Efectivo</option>
                    <option value="Tarjeta">Tarjeta</option>
                    <option value="Transferencia">Transferencia</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Total Pagado</label>
                <input type="number" step="0.01" name="total_paid" id="total_paid" placeholder="Ej. 1500.50" class="input input-bordered w-full" required>
            </div>
            
            <div class="flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <button type="button" id="btnVolver" class="btn btn-ghost">Cancelar</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/navbar.js"></script>
    <script type="module" src="../js/sales.js"></script>
</body>
</html>
