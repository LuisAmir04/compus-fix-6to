<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <title>Ventas</title>
</head>
<body class="p-8 bg-base-200 min-h-screen">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <div class="card bg-base-100 shadow-xl p-6">
            <h2 id="form-title" class="text-xl font-bold mb-4 text-primary">📦 Registrar Nueva Venta</h2>
            <form id="form-sale" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-end">
                <input type="hidden" id="id_sale" value="">

                <label class="form-control w-full">
                    <div class="label"><span class="label-text font-semibold">ID Orden</span></div>
                    <input type="number" id="id_order" class="input input-bordered w-full" required placeholder="Ej: 12">
                </label>

                <label class="form-control w-full">
                    <div class="label"><span class="label-text font-semibold">Técnico</span></div>
                    <input type="text" id="cashier_name" class="input input-bordered w-full" required placeholder="Nombre del técnico">
                </label>

                <label class="form-control w-full">
                    <div class="label"><span class="label-text font-semibold">Método de pago</span></div>
                    <select id="payment_method" class="select select-bordered w-full" required>
                        <option value="" disabled selected>Selecciona uno</option>
                        <option value="Efectivo">Efectivo</option>
                        <option value="Tarjeta">Tarjeta</option>
                        <option value="Transferencia">Transferencia</option>
                    </select>
                </label>

                <label class="form-control w-full">
                    <div class="label"><span class="label-text font-semibold">Total pagado ($)</span></div>
                    <input type="number" step="0.01" id="total_paid" class="input input-bordered w-full" required placeholder="0.00">
                </label>

                <div class="md:col-span-2 lg:col-span-4 flex gap-2 justify-end mt-2">
                    <button type="button" id="btn-cancel" class="btn btn-ghost hidden">Cancelar</button>
                    <button type="submit" id="btn-submit" class="btn btn-primary">Guardar Venta</button>
                </div>
            </form>
        </div>

        <div class="card bg-base-100 shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="table table-zebra w-full">
                    <thead>
                        <tr class="bg-base-300">
                            <th>ID Venta</th>
                            <th>ID Orden</th>
                            <th>Tecnico</th>
                            <th>Metodo de pago</th>
                            <th>Total pagado</th>
                            <th>Fecha de venta</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../js/sales.js"></script>
</body>
</html>
