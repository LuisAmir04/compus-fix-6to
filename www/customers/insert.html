<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Usuario</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-2xl bg-white rounded-xl shadow-xl overflow-hidden">

        <div class="bg-gray-600 px-8 py-6">
            <h2 class="text-3xl font-bold text-white">
                Registro de Clientes
            </h2>
            <p class="text-indigo-100 mt-1">
                Complete la información del cliente.
            </p>
        </div>

        <form id="formCustomers" class="p-8">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Nombre del Usuario</label>
                    <input id="name" type="text" placeholder="Nombre completo" required class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>
                
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Teléfono</label>
                    <input id="phone" type="tel" placeholder="999 999 9999" required class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Correo</label>
                    <input id="email" type="email" placeholder="correo@ejemplo.com" required class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>

            </div>

            <div class="flex justify-end gap-4 mt-8">

                <button type="reset" onclick="window.location.href='index.html'" class="px-6 py-3 bg-red-400 rounded-lg hover:bg-gray-400 transition cursor-pointer">
                    Cancelar
                </button>

                <button id="btnGuardar" type="submit" class="px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-indigo-700 transition cursor-pointer">
                    Guardar
                </button>

            </div>

        </form>

    </div>

    <script src="../js/customers.js"></script>

</body>
</html>
