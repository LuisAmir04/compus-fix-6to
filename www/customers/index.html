<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <title>Clientes</title>
</head>
<body class="p-8 bg-slate-50">
    <div id="navbar-container"></div>

    <div id="vista-tabla">
        <div class="mb-4">
            <button id="btnNuevo" class="flex items-center justify-center bg-blue-600 text-white px-4 py-2 rounded font-semibold hover:bg-blue-700 transition">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6 mr-2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
                Nuevo Cliente
            </button>
        </div>
        
        <div class="overflow-x-auto bg-white rounded-xl shadow-sm border border-gray-200">
            <table class="table table-zebra w-full">
                <thead class="bg-gray-100 text-gray-700">
                    <tr>
                        <th>ID</th>
                        <th>Nombre del Usuario</th>
                        <th>Correo</th>
                        <th>Teléfono</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

    <div id="vista-formulario" class="hidden flex items-center justify-center py-8">
        <div class="w-full max-w-2xl bg-white rounded-xl shadow-xl overflow-hidden border border-gray-200">
            
            <div class="bg-gray-600 px-8 py-6">
                <h2 id="tituloFormulario" class="text-3xl font-bold text-white">
                    Registro de Clientes
                </h2>
                <p class="text-indigo-100 mt-1">
                    Complete la información del cliente.
                </p>
            </div>

            <form id="formCustomers" class="p-8">
                <input type="hidden" name="id_customer" id="id_customer">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Nombre del Usuario</label>
                        <input id="name" name="name" type="text" placeholder="Nombre completo" required class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    </div>
                    
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Teléfono</label>
                        <input id="phone" name="phone" type="tel" placeholder="999 999 9999" required class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-gray-700 font-semibold mb-2">Correo</label>
                        <input id="email" name="email" type="email" placeholder="correo@ejemplo.com" required class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    </div>
                </div>

                <div class="flex justify-end gap-4 mt-8">
                    <button id="btnVolver" type="button" class="px-6 py-3 bg-red-400 text-white font-semibold rounded-lg hover:bg-red-500 transition cursor-pointer">
                        Cancelar
                    </button>

                    <button type="submit" class="px-6 py-3 bg-green-600 text-white font-semibold rounded-lg hover:bg-green-700 transition cursor-pointer">
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/navbar.js"></script>
    <script type="module" src="../js/customers.js"></script>
</body>
</html>
