<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <title>Formulario de Orden</title>
</head>
<body class="p-8">
    <h1 class="text-2xl font-bold mb-6">Orden</h1>

    <form id="formOrden" class="flex flex-col gap-4 max-w-lg">
        <input type="hidden" name="id_order">
        <select name="id_customer" class="select select-bordered w-full" required></select>
        <select name="id_device_type" class="select select-bordered w-full" required></select>
        <select name="id_service_type" class="select select-bordered w-full" required></select>
        <select name="id_user" class="select select-bordered w-full" required></select>
        <input type="text" name="brand_model" placeholder="Marca / Modelo" class="input input-bordered w-full" required>
        <textarea name="reported_fault" placeholder="Reporte del cliente" class="textarea textarea-bordered w-full" required></textarea>
        <textarea name="technical_diagnosis" placeholder="Diagnóstico técnico" class="textarea textarea-bordered w-full"></textarea>
        <input type="number" step="0.01" name="final_price" placeholder="Precio Final" class="input input-bordered w-full" required>
        <select name="id_status" class="select select-bordered w-full" required></select>
        <button type="submit" class="btn btn-primary">Guardar</button>
    </form>

    <script src="../js/repair_orders.js"></script>
</body>
</html>
