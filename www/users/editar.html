<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editar usuario</title>
</head>

<body>

<h1>Editar usuario</h1>

<form id="formEditar">

<input type="hidden" id="id_user">

<input type="text" id="username"><br><br>
<input type="password" id="password" placeholder="Nueva contraseña"><br><br>

<select id="id_role">
    <option value="1">Admin</option>
    <option value="2">Usuario</option>
</select>

<br><br>
<button type="submit">Actualizar</button>

</form>

<script>

const id = new URLSearchParams(window.location.search).get("id");

fetch("../php/users.php", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
        action: "getById",
        id_user: id
    })
})
.then(res => res.json())
.then(json => {

    document.querySelector("#id_user").value = json.data.id_user;
    document.querySelector("#username").value = json.data.username;
    document.querySelector("#id_role").value = json.data.id_role;

});

document.querySelector("#formEditar").addEventListener("submit", e => {
    e.preventDefault();

    fetch("../php/users.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            action: "update",
            id_user: document.querySelector("#id_user").value,
            username: document.querySelector("#username").value,
            password: document.querySelector("#password").value,
            id_role: document.querySelector("#id_role").value
        })
    })
    .then(res => res.json())
    .then(json => {

        if(json.status === "success"){
            alert("Actualizado");
            window.location = "index.html";
        } else {
            alert("Error");
        }

    });

});

</script>

</body>
</html>
