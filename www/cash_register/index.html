<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <title>Registros de Caja</title>
</head>
<body class="p-8">

    <div id="navbar-container"></div>

    <a href="agregar.html" id="btnAgregar" class="btn btn-primary mb-4">Agregar</a>

    <div id="tableSection" class="overflow-x-auto">
        <table class="table table-zebra w-full">
            <thead>
                <tr>
                    <th>ID Corte</th>
                    <th>ID Técnico</th>
                    <th>Hora de entrada</th>
                    <th>Dinero inicial</th>
                    <th>Hora de cierre</th>
                    <th>Dinero declarado</th>
                    <th>Acción</th>
                </tr>
            </thead>

            <tbody id="tbody"></tbody>
        </table>
    </div>

    <!-- FORMULARIO DE EDICIÓN -->
    <div id="editSection" class="hidden mt-10">
        <div class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow">

            <h2 class="text-2xl font-bold mb-4">
                Editar Corte de Caja
            </h2>

            <input
                type="hidden"
                id="edit_id_cut"
            >

            <label class="block mb-2">
                Dinero inicial
            </label>

            <input
                type="number"
                id="edit_initial_cash"
                class="input input-bordered w-full mb-4"
            >

            <label class="block mb-2">
                Dinero declarado
            </label>

            <input
                type="number"
                id="edit_declared_cash"
                class="input input-bordered w-full mb-4"
            >

            <div class="flex gap-3">
                <button
                    id="btnActualizar"
                    class="btn btn-primary"
                >
                    Guardar cambios
                </button>

                <button
                    id="btnCancelar"
                    class="btn btn-error"
                >
                    Cancelar
                </button>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="../js/navbar.js"></script>

    <script type="module" src="../js/cash_register.js?v=4"></script>

</body>
</html>
