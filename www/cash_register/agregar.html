<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <title>Agregar Corte</title>
</head>
<body class="p-8">
    <div class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow">
        <h2 class="text-2xl font-bold mb-4">Agregar Corte de Caja</h2>

        <label class="block mb-2">Usuario</label>
        <select id="id_user" class="select select-bordered w-full mb-4">
            <option value="">Seleccione un usuario</option>
        </select>

        <label class="block mb-2">Dinero inicial</label>
        <input type="number" id="initial_cash" class="input input-bordered w-full mb-4">

        <button id="btnGuardar" type="button" class="btn btn-primary">Guardar</button>
    </div>

    <script src="../js/agregar_cash_register.js"></script>
</body>
</html>
