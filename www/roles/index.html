<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <title>Roles</title>
</head>
<body class="p-8">
    <div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold">Roles</h1>
    <button id="btnNuevo" class="text-black hover:underline font-semibold">+ Nuevo Rol</button>
</div>

<div id="msgArea" class="mb-4"></div>
<form id="formRol" class="hidden flex gap-2 items-end mb-6">
    <input type="hidden" id="id_role">

    <div>
        <label class="label" for="name">Nombre del rol</label>
        <input
            type="text"
            id="name"
            name="name"
            class="input input-bordered"
            required>
    </div>

    <button
        type="submit"
        id="btnGuardar"
        class="text-black hover:underline font-semibold">
        Guardar
    </button>

    <button
        type="button"
        id="btnCancelar"
        class="text-black hover:underline">
        Cancelar
    </button>
</form>
    <div class="overflow-x-auto">
        <table class="table table-zebra w-full">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <script src="../js/roles.js"></script>
</body>
</html>
