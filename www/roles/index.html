<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <title>Roles</title>
</head>
<body class="p-8">
    <div id="navbar-container"></div>
    
    <div class="flex mb-4">
        <button id="btnNuevo" class="text-black hover:underline font-semibold">+ Nuevo Rol</button>
    </div>

    <div id="msgArea" class="mb-4"></div>

    <div id="vista-formulario" class="hidden mb-8">
        <div class="card bg-base-100 shadow-md border border-gray-200">
            <form id="formRol" class="card-body p-6">
                <h2 id="tituloFormulario" class="text-xl font-bold mb-4">Registrar Rol</h2>
                
                <input type="hidden" name="id_role" id="id_role">

                <div class="flex gap-4 items-end">
                    <div class="flex-1">
                        <label class="label font-semibold" for="name">Nombre del rol</label>
                        <input type="text" id="name" name="name" class="input input-bordered w-full" required>
                    </div>

                    <button type="submit" class="btn btn-primary font-semibold text-white px-8">
                        Guardar
                    </button>

                    <button type="button" id="btnVolver" class="btn btn-outline">
                        Cancelar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="vista-tabla" class="overflow-x-auto bg-white rounded-lg shadow-sm border border-gray-200">
        <table class="table table-zebra w-full">
            <thead class="bg-gray-50 text-gray-700">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/navbar.js"></script>
    <script type="module" src="../js/roles.js"></script>
</body>
</html>
