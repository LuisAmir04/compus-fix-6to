<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <title>Status</title>
</head>
<body class="p-8">
    <div id="navbar-container"></div>

    <div id="vista-tabla">
        <div class="mb-4">
            <button id="btnNuevo" class="bg-blue-600 text-white px-4 py-2 rounded font-semibold inline-block hover:bg-blue-700">
                + Nuevo Status
            </button>
        </div>
        
        <div class="overflow-x-auto">
            <table class="table table-zebra w-full">
                <thead>
                    <tr>
                        <th>ID Status</th>
                        <th>Nombre del Status</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

    <div id="vista-formulario" class="hidden min-h-[60vh] flex items-center justify-center p-4">
        <div class="card bg-base-100 w-full max-w-md shadow-xl border border-base-300">
            <div class="card-body">
                
                <form id="formStatus" class="space-y-6">
                    <h2 id="tituloFormulario" class="card-title text-2xl font-bold text-primary justify-center mb-2">
                        Registrar Nuevo Estatus
                    </h2>
                    
                    <input type="hidden" name="id_status" id="id_status">
                    
                    <div class="form-control w-full">
                        <label for="name" class="label font-semibold text-base-content/80 mb-1">
                            Nombre del Status
                        </label>
                        <input type="text" id="name" name="name" placeholder="Ej. En Espera, Enviado..." class="input input-bordered w-full focus:input-primary transition-all duration-200" required>
                    </div>
                    
                    <div class="flex flex-col gap-3 pt-2">
                        <button type="submit" class="btn btn-primary w-full shadow-md font-bold text-white hover:scale-[1.01] active:scale-[0.99] transition-all">
                            Guardar Status
                        </button>
                        
                        <button id="btnVolver" type="button" class="btn btn-outline btn-ghost w-full font-semibold">
                            Cancelar
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/navbar.js"></script>
    <script type="module" src="../js/statuses.js"></script>
</body>
</html>
